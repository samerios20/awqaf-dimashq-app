name: Build Awqaf Apps

# يبني تطبيق الأندرويد والآيفون تلقائياً على خوادم GitHub.
# الناتج يُرفع كـ Artifacts تُحمّل من صفحة Actions في المستودع.

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Prepare platforms and camera permission
        run: |
          flutter create --platforms=android,ios .
          MAN=android/app/src/main/AndroidManifest.xml
          grep -q "android.permission.CAMERA" "$MAN" || \
            sed -i 's#<application#<uses-permission android:name="android.permission.CAMERA"/>\n    <application#' "$MAN"
      - run: flutter pub get
      - run: flutter build apk --release
      - run: flutter build appbundle --release
      - uses: actions/upload-artifact@v4
        with:
          name: awqaf-android
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Prepare platforms and camera usage
        run: |
          flutter create --platforms=ios,android .
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string camera-for-items" ios/Runner/Info.plist || true
      - run: flutter pub get
      - run: flutter build ios --release --no-codesign
      - run: cd build/ios/iphoneos && zip -r app.zip Runner.app
      - uses: actions/upload-artifact@v4
        with:
          name: awqaf-ios-unsigned
          path: build/ios/iphoneos/app.zip
