name: awqaf_dimashq
description: تطبيق تبادل مستلزمات المساجد — مديرية أوقاف دمشق (أندرويد + آيفون)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0                 # طلبات الـ API
  shared_preferences: ^2.2.0   # حفظ رمز الدخول على الجهاز
  image_picker: ^1.0.0         # التقاط صورة الغرض من الكاميرا/المعرض
  cupertino_icons: ^1.0.6

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png   # شعار نسر الجمهورية (استبدله بالملف الرسمي عند توفّره)
